# Local development stack.
# Run: docker-compose up -d
# This spins up Postgres locally so you can develop without touching GCP.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: v8engine
      POSTGRES_USER: v8operator
      POSTGRES_PASSWORD: localdev123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U v8operator -d v8engine"]
      interval: 5s
      timeout: 3s
      retries: 5

  ingestor:
    build:
      context: .
      args:
        SERVICE: ingestor
    ports:
      - "8081:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: v8engine
      DB_USER: v8operator
      DB_PASSWORD: localdev123
    depends_on:
      postgres:
        condition: service_healthy

  modeler:
    build:
      context: .
      args:
        SERVICE: modeler
    ports:
      - "8082:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: v8engine
      DB_USER: v8operator
      DB_PASSWORD: localdev123
    depends_on:
      postgres:
        condition: service_healthy

  scanner:
    build:
      context: .
      args:
        SERVICE: scanner
    ports:
      - "8083:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: v8engine
      DB_USER: v8operator
      DB_PASSWORD: localdev123
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: .
      args:
        SERVICE: dashboard
    ports:
      - "8084:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: v8engine
      DB_USER: v8operator
      DB_PASSWORD: localdev123
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
